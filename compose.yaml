services:
  php:
    build: .
    image: thebuilderhero/budgetonline:1.0 #image to be built
    container_name: server-1
    ports:
      - "80:80"
    depends_on:
      - other_db
    networks:
      - app-network

  other_db:
    image: mysql:8.0
    build: # this allows for running and building SQL remote.
      context: .
      dockerfile: Dockerfile.mysql
    #volumes:
    #  - ./mysql/init:/docker-entrypoint-initdb.d
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: other_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=other_db
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - other_db
    networks:
      - app-network

networks:
  app-network:



